<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAYMIN 지원동기 리뷰 시스템</title>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --navy:#1F3864;--blue:#2E5090;--lblue:#1F6FB2;--bg:#F4F6F9;
  --card:#FFF;--border:#E1E5EB;--text:#2B2F36;--muted:#7A828E;
  --green:#1D9E75;--amber:#BA7517;--red:#C0392B;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#eef2f7;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px 10px;}
.wrap{font-family:'Noto Sans KR',Arial,sans-serif;width:100%;max-width:820px;color:var(--text);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--navy);border-radius:12px 12px 0 0;flex-wrap:wrap;gap:8px;}
.topbar .logo{color:#fff;font-weight:700;font-size:15px;}
.topbar .userinfo{color:#cfe0f7;font-size:12.5px;display:flex;align-items:center;gap:8px;}
.role-badge{background:#3a5a94;color:#fff;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px;}
.topbar button{background:transparent;border:1px solid #5c79a8;color:#dce8fb;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;}
.topbar button:hover{background:#2c4877;}
.panel{background:var(--bg);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;padding:18px;min-height:500px;}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.tab{padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted);}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.name{font-weight:700;font-size:14.5px;}
.meta{font-size:12px;color:var(--muted);margin-top:2px;}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.b-wait{background:#FCE9E0;color:var(--red);}
.b-mid{background:#FCF1D8;color:var(--amber);}
.b-done{background:#E1F5EE;color:var(--green);}
.b-rev{background:#E6EEFB;color:var(--lblue);}
.btn{background:var(--navy);color:#fff;border:none;border-radius:7px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;}
.btn:hover{background:var(--blue);}
.btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--navy);}
.btn.danger{background:#fff;color:var(--red);border:1px solid var(--red);}
.btn.sm{padding:5px 10px;font-size:12px;}
.btn.saved{background:var(--green)!important;color:#fff!important;}
.btn.dirty{background:var(--amber)!important;color:#fff!important;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
input,select,textarea{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px 11px;font-size:13.5px;font-family:inherit;background:#fff;color:var(--text);transition:border .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--lblue);}
textarea{min-height:110px;resize:vertical;line-height:1.5;}
label{font-size:12px;color:var(--muted);font-weight:700;display:block;margin:10px 0 4px;}
.hint{font-size:11.5px;color:var(--muted);margin-top:4px;}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(31,56,100,.12);}
.login-box h2{color:var(--navy);font-size:20px;margin-bottom:6px;text-align:center;}
.login-box .sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:22px;}
.switch{font-size:12.5px;color:var(--lblue);cursor:pointer;margin-top:10px;text-decoration:underline;text-align:center;}
.err{color:var(--red);font-size:12.5px;margin-top:8px;text-align:center;}
.ok{color:var(--green);font-size:12.5px;margin-top:8px;text-align:center;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 0;}
.back{font-size:12.5px;color:var(--lblue);cursor:pointer;margin-bottom:12px;display:inline-flex;align-items:center;gap:4px;}
.back:hover{text-decoration:underline;}
.verdict-pick{display:flex;gap:8px;margin:8px 0;}
.vbtn{flex:1;text-align:center;padding:10px;border-radius:8px;border:2px solid var(--border);cursor:pointer;font-weight:700;font-size:13px;color:var(--muted);background:#fff;transition:all .15s;}
.vbtn:hover{border-color:#aab;}
.vbtn.sel-O{border-color:var(--green);color:var(--green);background:#E1F5EE;}
.vbtn.sel-T{border-color:var(--amber);color:var(--amber);background:#FCF1D8;}
.vbtn.sel-X{border-color:var(--red);color:var(--red);background:#FCE9E0;}
.draft{white-space:pre-wrap;font-size:13.5px;line-height:1.65;background:#fafafa;border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:8px;}
.sectiontitle{font-size:13px;font-weight:700;color:var(--navy);margin:16px 0 6px;padding-bottom:4px;border-bottom:2px solid var(--border);}
.role-pick{display:flex;gap:8px;margin:4px 0;}
.rbtn{flex:1;text-align:center;padding:9px;border-radius:7px;border:1px solid var(--border);cursor:pointer;font-size:12.5px;font-weight:700;color:var(--muted);background:#fff;transition:all .15s;}
.rbtn.sel{border-color:var(--navy);color:var(--navy);background:#EAF0FA;}
.decision-box{border-radius:8px;padding:12px;margin-top:8px;}
.decision-box.O{background:#E1F5EE;border:1px solid #b8e6d4;}
.decision-box.T{background:#FCF1D8;border:1px solid #f3dca0;}
.decision-box.X{background:#FCE9E0;border:1px solid #f1c2b0;}
.decision-box .v{font-weight:700;font-size:13px;margin-bottom:4px;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--muted);gap:12px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top:3px solid var(--navy);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.roundhead{font-size:12.5px;font-weight:700;color:#fff;background:var(--blue);display:inline-block;padding:4px 12px;border-radius:6px;margin:14px 0 8px;}
table.simple{width:100%;border-collapse:collapse;font-size:12.5px;}
table.simple th{text-align:left;color:var(--muted);font-weight:700;padding:7px 6px;border-bottom:2px solid var(--border);}
table.simple td{padding:8px 6px;border-bottom:1px solid #eee;}
.pill{font-size:10.5px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1px 7px;color:var(--muted);}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ─── Firebase 초기화 ─────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyATERH3f0I7aiOZYNzUZoNgrmu_SMKy9Kc",
  authDomain: "jaymin-jrs.firebaseapp.com",
  projectId: "jaymin-jrs",
  storageBucket: "jaymin-jrs.firebasestorage.app",
  messagingSenderId: "918757165919",
  appId: "1:918757165919:web:d3a1540370d1b41eb2c4ea"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ─── 상수 ──────────────────────────────────────────────
const DEPTS   = ["예술경영","방송영상","공연연출","공통"];
const CLASSES = ["월1반","월2반","화1반","화2반","수1반","수2반","목1반","목2반",
  "금1반","금2반","금3반","금4반",
  "토1반","토2반","토3반","토4반","토5반","토6반","토7반","토8반",
  "일1반","일2반","일3반","일4반","속성반"];
const TRACKS  = ["수시","정시"];
const ADMIN_CODE = "JAYMIN0000";
const CUR_YEAR = new Date().getFullYear();
const YEARS = [CUR_YEAR-1, CUR_YEAR, CUR_YEAR+1, CUR_YEAR+2];
const VMAP  = {O:"O 통과/승인", T:"△ 수정 필요", X:"X 재작성 필요"};

// ─── 상태 ──────────────────────────────────────────────
let DATA     = { users:{}, students:{}, submissions:{} };
let pendingReg = null; // 가입 직후 프로필 저장용 임시 변수
let session  = null;   // { uid, email, profile }
let loading  = true;
let view     = makeDefaultView();

function makeDefaultView(){
  return {
    tab:"mine", studentId:null, mode:"login", authErr:"", regRole:"teacher", regDept:DEPTS[0],
    verdictPick:null, reviewComment:"", adminVerdict:null, adminComment:"", resubmitDeadline:"",
    editingStudent:false, recoverStep:1, recoverEmail:"", recoverErr:"", recoverOk:""
  };
}

// ─── 유틸 ──────────────────────────────────────────────
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function uid(){ return "_" + Math.random().toString(36).slice(2,10); }
function todayPlus(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function isAdmin(){ return session && DATA.users[session.uid] && DATA.users[session.uid].role === "admin"; }
function myProfile(){ return session && DATA.users[session.uid]; }

function userLabel(uid){ 
  const u=DATA.users[uid]; 
  if(!u) return "(탈퇴 계정)"; 
  return u.displayName + (u.role==="admin"?" (관리자)":""); 
}
function userLabelFull(uid){ 
  const u=DATA.users[uid]; 
  if(!u) return "(탈퇴 계정)"; 
  return `${esc(u.dept||"-")} · ${esc(u.displayName)}${u.role==="admin"?" (관리자)":""}`; 
}

function subOf(id){
  if(!DATA.submissions[id]) DATA.submissions[id] = {versions:[], rounds:[]};
  return DATA.submissions[id];
}
function lastRound(sub){ return sub.rounds.length ? sub.rounds[sub.rounds.length-1] : null; }

function statusOf(id){
  const sub = subOf(id);
  if(!sub.versions.length) return {label:"미제출", cls:"b-wait"};
  const r = lastRound(sub);
  if(!r) return {label:"리뷰 배정 필요", cls:"b-wait"};
  const n = sub.rounds.length;
  if(!r.adminDecision){
    const done = r.reviewers.filter(rv=>rv.feedback).length;
    if(done>=2) return {label:`${n}차 · 최종결정 대기`, cls:"b-mid"};
    const over = r.reviewers.some(rv=>!rv.feedback && new Date(rv.deadline)<new Date());
    return {label:`${n}차 리뷰중 (${done}/2)${over?" · 기한초과":""}`, cls:over?"b-wait":"b-rev"};
  }
  if(r.adminDecision.verdict==="O") return {label:"✅ 승인 완료", cls:"b-done"};
  return {label:`${n}차 수정요청 (${r.adminDecision.resubmitDeadline||"-"})`, cls:"b-wait"};
}

// ─── Firestore CRUD ─────────────────────────────────────
async function loadAllData(){
  try {
    const [uSnap, sSnap, subSnap] = await Promise.all([
      db.collection("users").get(),
      db.collection("students").get(),
      db.collection("submissions").get()
    ]);
    DATA.users = {};      uSnap.forEach(d=>{ DATA.users[d.id] = d.data(); });
    DATA.students = {};   sSnap.forEach(d=>{ DATA.students[d.id] = d.data(); });
    DATA.submissions = {};subSnap.forEach(d=>{ DATA.submissions[d.id] = d.data(); });
  } catch(e) {
    console.error("Firestore 읽기 오류:", e.code, e.message);
    if(e.code === "permission-denied") throw new Error("PERMISSION_DENIED");
    throw e;
  }
}

async function saveStudent(id){ console.log("[JRS] 학생 저장:", id); await db.collection("students").doc(id).set(DATA.students[id]); console.log("[JRS] 학생 저장 완료"); }
async function deleteStudent(id){ 
  await Promise.all([
    db.collection("students").doc(id).delete(),
    db.collection("submissions").doc(id).delete()
  ]);
}
async function saveSubmission(id){ console.log("[JRS] 제출물 저장:", id); await db.collection("submissions").doc(id).set(DATA.submissions[id]); console.log("[JRS] 제출물 저장 완료"); }
async function saveUserProfile(uid){ console.log("[JRS] 유저 프로필 저장:", uid); await db.collection("users").doc(uid).set(DATA.users[uid]); console.log("[JRS] 유저 프로필 저장 완료"); }
async function deleteUserDoc(uid){ await db.collection("users").doc(uid).delete(); }

// ─── 렌더 ──────────────────────────────────────────────
function render(){
  const root = document.getElementById("root");
  if(loading){ root.innerHTML = renderLoading(); return; }
  if(!session){ root.innerHTML = renderLoginPage(); attachLoginEvents(); return; }
  root.innerHTML = renderApp();
  attachAppEvents();
}

function renderLoading(){
  return `<div class="loading"><div class="spinner"></div><div>불러오는 중...</div></div>`;
}

// ─── 로그인 페이지 ──────────────────────────────────────
function renderLoginPage(){
  if(view.mode==="register") return renderRegister();
  if(view.mode==="recover")  return renderRecover();
  return `<div class="login-wrap"><div class="login-box">
    <h2>JAYMIN 지원동기 리뷰 시스템</h2>
    <div class="sub">이메일과 비밀번호로 로그인하세요</div>
    <label>이메일</label><input id="l-email" type="email" placeholder="example@email.com" autocapitalize="off" autocorrect="off" autocomplete="email" spellcheck="false" />
    <label>비밀번호</label><input id="l-pw" type="password" autocomplete="current-password" />
    <div style="margin-top:16px;"><button class="btn" id="l-submit" style="width:100%">로그인</button></div>
    ${view.authErr ? `<div class="err">${esc(view.authErr)}</div>` : ""}
    <div class="switch" id="to-reg">계정이 없어요 → 가입하기</div>
    <div class="switch" id="to-rec">비밀번호를 잊으셨나요?</div>
  </div></div>`;
}

function renderRegister(){
  return `<div class="login-wrap"><div class="login-box">
    <h2>JAYMIN 지원동기 리뷰 시스템</h2>
    <div class="sub">새 계정 만들기</div>
    <label>이메일</label><input id="r-email" type="email" placeholder="example@email.com" autocapitalize="off" autocorrect="off" autocomplete="email" spellcheck="false" />
    <label>비밀번호 (6자 이상)</label><input id="r-pw" type="password" autocomplete="new-password" />
    <label>학과</label>
    <select id="r-dept">${DEPTS.map(d=>`<option value="${d}" ${view.regDept===d?"selected":""}>${d}</option>`).join("")}</select>
    <label>이름 (이름 뒤에 T를 붙여 입력해주세요)</label>
    <input id="r-name" placeholder="길동T" />
    <div class="hint">예: 본인 이름이 '홍길동'이라면 → 길동T</div>
    <label>역할</label>
    <div class="role-pick">
      <div class="rbtn ${view.regRole==="teacher"?"sel":""}" data-role="teacher">담당 선생님</div>
      <div class="rbtn ${view.regRole==="admin"?"sel":""}" data-role="admin">원장/부원장</div>
    </div>
    ${view.regRole==="admin" ? `<label>관리자 코드</label><input id="r-code" placeholder="관리자 코드를 입력하세요" />` : ""}
    <div style="margin-top:16px;"><button class="btn" id="r-submit" style="width:100%">가입하고 시작</button></div>
    ${view.authErr ? `<div class="err">${esc(view.authErr)}</div>` : ""}
    <div class="switch" id="to-login">이미 계정이 있어요 → 로그인</div>
  </div></div>`;
}

function renderRecover(){
  return `<div class="login-wrap"><div class="login-box">
    <h2>비밀번호 찾기</h2>
    <div class="sub">가입한 이메일로 재설정 링크를 보내드려요</div>
    <label>이메일</label><input id="rec-email" type="email" placeholder="가입 시 사용한 이메일" autocapitalize="off" autocorrect="off" autocomplete="email" spellcheck="false" />
    <div style="margin-top:16px;"><button class="btn" id="rec-submit" style="width:100%">재설정 링크 보내기</button></div>
    ${view.recoverErr ? `<div class="err">${esc(view.recoverErr)}</div>` : ""}
    ${view.recoverOk ? `<div class="ok">${esc(view.recoverOk)}</div>` : ""}
    <div class="switch" id="to-login">← 로그인으로 돌아가기</div>
  </div></div>`;
}

function attachLoginEvents(){
  q("to-reg",  e=> e.onclick=()=>{ view.mode="register"; view.authErr=""; render(); });
  q("to-login",e=> e.onclick=()=>{ view.mode="login"; view.authErr=""; render(); });
  q("to-rec",  e=> e.onclick=()=>{ view.mode="recover"; view.recoverErr=""; view.recoverOk=""; render(); });

  document.querySelectorAll(".rbtn").forEach(b=>{
    b.onclick=()=>{ view.regRole=b.dataset.role; render(); };
  });
  q("r-dept", e=> e.onchange=ev=>{ view.regDept=ev.target.value; });

  q("l-submit", btn=> btn.onclick=async()=>{
    const email = val("l-email").trim().toLowerCase(), pw = val("l-pw").trim();
    if(!email||!pw){ view.authErr="이메일과 비밀번호를 입력해주세요."; render(); return; }
    btn.disabled=true; btn.textContent="로그인 중...";
    try{
      await auth.signInWithEmailAndPassword(email, pw);
    } catch(e){
      view.authErr = firebaseErrMsg(e.code);
      btn.disabled=false; btn.textContent="로그인";
      render();
    }
  });

  q("r-submit", btn=> btn.onclick=async()=>{
    const email=val("r-email").trim().toLowerCase(), pw=val("r-pw").trim(), dept=val("r-dept"),
          name=val("r-name").trim();
    if(!email||!pw||!name){ view.authErr="모든 칸을 입력해주세요."; render(); return; }
    if(view.regRole==="admin"){
      const code=val("r-code");
      if(code!==ADMIN_CODE){ view.authErr="관리자 코드가 올바르지 않습니다."; render(); return; }
    }
    btn.disabled=true; btn.textContent="가입 중...";
    // onAuthStateChanged보다 먼저 프로필 데이터를 저장해둠 (race condition 방지)
    pendingReg = { displayName:name, dept, role:view.regRole, interest:"", email };
    try{
      await auth.createUserWithEmailAndPassword(email, pw);
      // 이후 onAuthStateChanged에서 pendingReg를 Firestore에 저장함
    } catch(e){
      pendingReg = null;
      view.authErr = firebaseErrMsg(e.code);
      btn.disabled=false; btn.textContent="가입하고 시작";
      render();
    }
  });

  q("rec-submit", btn=> btn.onclick=async()=>{
    const email=val("rec-email").trim().toLowerCase();
    if(!email){ view.recoverErr="이메일을 입력해주세요."; render(); return; }
    btn.disabled=true;
    try{
      await auth.sendPasswordResetEmail(email);
      view.recoverOk="재설정 링크를 이메일로 보냈어요. 메일함을 확인해주세요.";
      view.recoverErr=""; render();
    } catch(e){
      view.recoverErr = firebaseErrMsg(e.code); render();
    }
  });
}

// ─── 앱 메인 ────────────────────────────────────────────
function renderApp(){
  const admin = isAdmin();
  const me = myProfile();
  const myAssignments = Object.entries(DATA.students).filter(([id])=>{
    const sub=subOf(id); const r=lastRound(sub);
    return r && !r.adminDecision && r.reviewers.some(rv=>rv.user===session.uid && !rv.feedback);
  });

  const myStudentCount = Object.values(DATA.students).filter(s=>s.owner===session.uid).length;
  const tabs = [];
  if(admin) tabs.push({k:"admin",l:"전체 현황"});
  tabs.push({k:"status",l:"내 학생 현황"});
  tabs.push({k:"mine",l:"학생 추가/관리"});
  if(myAssignments.length || view.tab==="review") tabs.push({k:"review",l:`리뷰 요청 (${myAssignments.length})`});
  if(admin) tabs.push({k:"load",l:"리뷰어 현황"});
  if(admin) tabs.push({k:"users",l:"사용자 관리"});

  let body="";
  if(view.studentId)                    body=renderDetail(view.studentId);
  else if(view.tab==="admin"&&admin)    body=renderAdminDashboard();
  else if(view.tab==="status")          body=renderMyStatusDashboard();
  else if(view.tab==="load"&&admin)     body=renderReviewerLoad();
  else if(view.tab==="users"&&admin)    body=renderUserManagement();
  else if(view.tab==="review")          body=renderReviewQueue(myAssignments);
  else                                  body=renderMyStudents();

  return `<div class="wrap">
    <div class="topbar">
      <div class="logo">JAYMIN 지원동기 리뷰 시스템</div>
      <div class="userinfo">
        <span>${esc(me?me.displayName:session.email)}님${admin?'<span class="role-badge">관리자</span>':''}</span>
        <button id="logout-btn">로그아웃</button>
      </div>
    </div>
    <div class="panel">
      ${!view.studentId?`<div class="tabs">${tabs.map(t=>`<div class="tab ${view.tab===t.k?"active":""}" data-tab="${t.k}">${t.l}</div>`).join("")}</div>`:""}
      ${body}
    </div>
  </div>`;
}

// ─── 내 학생 현황 (선생님용) ─────────────────────────────
function renderMyStatusDashboard(){
  const mine = Object.entries(DATA.students).filter(([,s])=>s.owner===session.uid);
  if(!mine.length) return `<div class="empty" style="padding:60px 0">
    <div style="font-size:40px;margin-bottom:12px">📋</div>
    <div style="font-weight:700;margin-bottom:8px">등록된 학생이 없어요</div>
    <div style="font-size:12px">"학생 추가/관리" 탭에서 학생을 추가해주세요.</div>
  </div>`;

  const total = mine.length;
  let counts = {none:0, needReview:0, inReview:0, waitDecision:0, needRevise:0, approved:0};
  mine.forEach(([id])=>{
    const sub=subOf(id); const r=lastRound(sub);
    if(!sub.versions.length){ counts.none++; return; }
    if(!r){ counts.needReview++; return; }
    if(!r.adminDecision){
      const done=r.reviewers.filter(rv=>rv.feedback).length;
      if(done>=2) counts.waitDecision++; else counts.inReview++;
    } else {
      if(r.adminDecision.verdict==="O") counts.approved++; else counts.needRevise++;
    }
  });
  const pct = total>0 ? Math.round(counts.approved/total*100) : 0;

  let html = `<div class="card">
    <div class="sectiontitle" style="margin-top:0">전체 진행 현황</div>
    <div style="display:flex;align-items:center;gap:16px;margin:8px 0 12px">
      <div style="font-size:26px;font-weight:700;color:var(--navy)">${counts.approved}<span style="font-size:14px;color:var(--muted);font-weight:400"> / ${total}명 승인</span></div>
      <div style="flex:1">
        <div style="background:var(--border);border-radius:20px;height:10px;overflow:hidden">
          <div style="background:var(--green);height:100%;width:${pct}%;border-radius:20px"></div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">${pct}% 완료</div>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${counts.none?`<span class="badge b-wait">미제출 ${counts.none}명</span>`:""}
      ${counts.needReview?`<span class="badge b-wait">배정 대기 ${counts.needReview}명</span>`:""}
      ${counts.inReview?`<span class="badge b-rev">리뷰중 ${counts.inReview}명</span>`:""}
      ${counts.waitDecision?`<span class="badge b-mid">결정 대기 ${counts.waitDecision}명</span>`:""}
      ${counts.needRevise?`<span class="badge b-wait">수정요청 ${counts.needRevise}명</span>`:""}
      ${counts.approved?`<span class="badge b-done">승인 완료 ${counts.approved}명</span>`:""}
    </div>
  </div>`;

  html += mine.map(([id,s])=>{
    const st=statusOf(id);
    const sub=subOf(id);
    const r=lastRound(sub);
    const roundNo=sub.rounds.length;
    const latestDecision = r?.adminDecision;
    return `<div class="card" data-open="${id}" style="cursor:pointer">
      <div class="row">
        <div style="flex:1;min-width:0">
          <div class="name">${esc(s.name)} <span class="pill">${s.year}년 ${s.track}</span></div>
          <div class="meta">${esc(s.dept)} · ${esc(s.cls)}${roundNo>0?" · "+roundNo+"차 진행":""}</div>
          ${latestDecision && latestDecision.verdict!=="O" && latestDecision.comment
            ? `<div style="font-size:11.5px;color:var(--amber);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">💬 ${esc(latestDecision.comment.slice(0,45))}${latestDecision.comment.length>45?"...":""}</div>`
            : ""}
        </div>
        <div class="badge ${st.cls}" style="margin-left:8px;flex-shrink:0">${st.label}</div>
      </div>
    </div>`;
  }).join("");

  return html;
}

// ─── 리뷰어 현황 ────────────────────────────────────────
function renderReviewerLoad(){
  const stats={};
  Object.values(DATA.submissions).forEach(sub=>{
    (sub.rounds||[]).forEach(r=>{
      r.reviewers.forEach(rv=>{
        if(!stats[rv.user]) stats[rv.user]={assigned:0,done:0};
        stats[rv.user].assigned++;
        if(rv.feedback) stats[rv.user].done++;
      });
    });
  });
  const rows=Object.entries(stats).sort((a,b)=>b[1].assigned-a[1].assigned);
  if(!rows.length) return `<div class="empty">아직 배정 기록이 없습니다.</div>`;
  return `<div class="card"><table class="simple">
    <tr><th>선생님</th><th>배정</th><th>완료</th><th>대기</th></tr>
    ${rows.map(([u,st])=>`<tr><td>${userLabelFull(u)}</td><td>${st.assigned}</td><td>${st.done}</td><td>${st.assigned-st.done}</td></tr>`).join("")}
  </table></div>`;
}

// ─── 학생 상세 ──────────────────────────────────────────
function renderDetail(studentId){
  const s=DATA.students[studentId];
  if(!s) return `<div class="back" id="back-btn">← 목록으로</div><div class="empty">삭제된 학생입니다.</div>`;
  const admin=isAdmin();
  const isOwner=s.owner===session.uid;
  const sub=subOf(studentId);
  const vIdx=sub.versions.length-1;
  const latest=vIdx>=0?sub.versions[vIdx]:null;
  const r=lastRound(sub);
  const isMyReview=r&&!r.adminDecision&&r.reviewers.some(rv=>rv.user===session.uid&&!rv.feedback);

  let html=`<div class="back" id="back-btn">← 목록으로</div>`;

  // 학생 정보 카드
  if(view.editingStudent){
    html+=`<div class="card">
      <div class="sectiontitle" style="margin-top:0">학생 정보 수정</div>
      <label>이름</label><input id="e-name" value="${esc(s.name)}" />
      <div class="grid2">
        <div><label>학과</label><select id="e-dept">${DEPTS.filter(d=>d!=="공통").map(d=>`<option ${s.dept===d?"selected":""}>${d}</option>`).join("")}</select></div>
        <div><label>반</label><select id="e-cls">${CLASSES.map(c=>`<option ${s.cls===c?"selected":""}>${c}</option>`).join("")}</select></div>
      </div>
      <div class="grid2">
        <div><label>연도</label><select id="e-year">${YEARS.map(y=>`<option value="${y}" ${String(s.year)===String(y)?"selected":""}>${y}년</option>`).join("")}</select></div>
        <div><label>전형</label><select id="e-track">${TRACKS.map(t=>`<option ${s.track===t?"selected":""}>${t}</option>`).join("")}</select></div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn" id="save-edit">저장</button>
        <button class="btn ghost" id="cancel-edit">취소</button>
      </div>
    </div>`;
  } else {
    html+=`<div class="card">
      <div class="row">
        <div>
          <div class="name">${esc(s.name)} <span class="pill">${s.year}년 ${s.track}</span></div>
          <div class="meta">${esc(s.dept)} · ${esc(s.cls)}${latest?` · ${sub.rounds.length}차 진행 중 / v${vIdx+1}`:" · 제출 전"}</div>
        </div>
        ${(isOwner||admin)?`<div style="display:flex;gap:6px">
          <button class="btn ghost sm" id="edit-stu-btn">수정</button>
          <button class="btn danger sm" id="del-stu-btn">삭제</button>
        </div>`:""}
      </div>
      ${latest?`<div class="draft">${esc(latest.text)}</div>`:`<div class="empty">아직 제출된 지원동기가 없습니다.</div>`}
    </div>`;
  }

  // 회차별 리뷰 기록 (담당 선생님 + 관리자에게만)
  if(sub.rounds.length && (isOwner||admin)){
    sub.rounds.forEach((rd,i)=>{
      html+=`<div class="roundhead">${i+1}차 리뷰</div><div class="card">`;
      rd.reviewers.forEach(rv=>{
        html+=`<div style="margin-bottom:10px">
          <div class="meta" style="font-weight:700;color:var(--navy)">
            리뷰어 ${rv.slot}${admin?" · "+userLabelFull(rv.user):""}
          </div>
          ${rv.feedback
            ?`<div class="decision-box ${rv.feedback.verdict}"><div class="v">${VMAP[rv.feedback.verdict]}</div><div>${esc(rv.feedback.comment)}</div></div>`
            :`<div class="meta">마감 ${rv.deadline} · 리뷰 작성 전</div>`}
        </div>`;
      });
      if(rd.adminDecision){
        html+=`<div style="margin-top:6px">
          <div class="meta" style="font-weight:700;color:var(--navy)">원장/부원장 최종 결정</div>
          <div class="decision-box ${rd.adminDecision.verdict}">
            <div class="v">${VMAP[rd.adminDecision.verdict]}</div>
            <div>${esc(rd.adminDecision.comment)}</div>
            ${rd.adminDecision.resubmitDeadline&&rd.adminDecision.verdict!=="O"
              ?`<div class="meta" style="margin-top:6px">재제출 기한: ${rd.adminDecision.resubmitDeadline}</div>`:""}
          </div>
        </div>`;
      }
      html+=`</div>`;
    });
  }

  // 담당 선생님: 제출/재제출 칸
  if(isOwner){
    const canSubmit = !r || !r.adminDecision || r.adminDecision.verdict!=="O";
    if(canSubmit){
      html+=`<div class="card">
        <div class="sectiontitle" style="margin-top:0">${vIdx>=0?"수정본 제출":"지원동기 첫 제출"}</div>
        <textarea id="new-text" placeholder="지원동기를 입력하세요..."></textarea>
        <div style="margin-top:10px"><button class="btn" id="submit-ver">${vIdx>=0?"수정본 제출":"제출하기"}</button></div>
      </div>`;
    }
  }

  // 관리자: 리뷰어 배정 or 최종 결정
  if(admin){
    const needsAssign = latest && (!r || r.versionIndex!==vIdx);
    if(needsAssign){
      const opts=Object.entries(DATA.users)
        .filter(([u])=>u!==s.owner)
        .map(([u,p])=>`<option value="${u}">${esc(p.dept||"-")} · ${esc(p.displayName)}${p.role==="admin"?" (관리자)":""}${p.interest?" — "+esc(p.interest.slice(0,20)):""}</option>`)
        .join("");
      html+=`<div class="card">
        <div class="sectiontitle" style="margin-top:0">리뷰어 지정 (${sub.rounds.length+1}차)</div>
        <label>리뷰어 1</label><select id="a-r1">${opts}</select>
        <label>리뷰어 2</label><select id="a-r2">${opts}</select>
        <label>마감일</label><input id="a-dl" type="date" value="${todayPlus(3)}" />
        <div style="margin-top:12px"><button class="btn" id="assign-btn">리뷰 배정하기</button></div>
      </div>`;
    } else if(r && !r.adminDecision){
      const done=r.reviewers.filter(rv=>rv.feedback).length;
      if(done<2){
        html+=`<div class="card"><div class="meta">${done}/2명 리뷰 완료. 2명 모두 완료 후 최종 결정을 작성할 수 있습니다.</div></div>`;
      } else {
        html+=`<div class="card">
          <div class="sectiontitle" style="margin-top:0">최종 결정 작성</div>
          <div class="verdict-pick">
            <div class="vbtn ${view.adminVerdict==="O"?"sel-O":""}" data-av="O">O 승인</div>
            <div class="vbtn ${view.adminVerdict==="T"?"sel-T":""}" data-av="T">△ 수정</div>
            <div class="vbtn ${view.adminVerdict==="X"?"sel-X":""}" data-av="X">X 재작성</div>
          </div>
          <textarea id="admin-cmt" placeholder="선생님에게 전달할 종합 의견을 입력하세요...">${esc(view.adminComment)}</textarea>
          <label>재제출 기한</label>
          <input id="resub-dl" type="date" value="${view.resubmitDeadline||todayPlus(5)}" />
          <div style="margin-top:10px"><button class="btn" id="admin-decide-btn">최종 결정 전달</button></div>
        </div>`;
      }
    }
  }

  // 리뷰어: 리뷰 작성 칸
  if(isMyReview){
    const slot=r.reviewers.find(rv=>rv.user===session.uid);
    html+=`<div class="card">
      <div class="sectiontitle" style="margin-top:0">리뷰 작성 · 마감 ${slot.deadline}</div>
      <textarea id="rev-cmt" placeholder="구체적인 의견을 작성해주세요...">${esc(view.reviewComment)}</textarea>
      <div class="verdict-pick" style="margin-top:10px">
        <div class="vbtn ${view.verdictPick==="O"?"sel-O":""}" data-v="O">O 통과</div>
        <div class="vbtn ${view.verdictPick==="T"?"sel-T":""}" data-v="T">△ 수정</div>
        <div class="vbtn ${view.verdictPick==="X"?"sel-X":""}" data-v="X">X 재작성</div>
      </div>
      <div style="margin-top:10px"><button class="btn" id="submit-rev">리뷰 제출 (원장/부원장에게 전달)</button></div>
    </div>`;
  }

  return html;
}

// ─── 앱 이벤트 ──────────────────────────────────────────
function attachAppEvents(){
  q("logout-btn", e=> e.onclick=()=> auth.signOut());
  document.querySelectorAll(".tab").forEach(t=>{ t.onclick=()=>{ view.tab=t.dataset.tab; view.studentId=null; render(); }; });
  document.querySelectorAll("[data-open]").forEach(c=>{ c.onclick=()=>{ view.studentId=c.dataset.open; view.verdictPick=null; view.reviewComment=""; view.adminVerdict=null; view.adminComment=""; view.editingStudent=false; render(); }; });
  q("back-btn", e=> e.onclick=()=>{ view.studentId=null; render(); });

  // 관심분야 저장 (시각적 피드백)
  q("save-interest", btn=> btn.onclick=async()=>{
    btn.disabled=true; btn.textContent="저장 중...";
    DATA.users[session.uid].interest = val("interest-ta");
    try{
      await saveUserProfile(session.uid);
      btn.textContent="✓ 저장됨"; btn.classList.add("saved"); btn.classList.remove("dirty");
      const msg=document.getElementById("save-interest-msg");
      if(msg){ msg.textContent="저장되었습니다."; msg.style.color="var(--green)"; }
    } catch(e){
      btn.textContent="실패 - 다시 시도"; btn.classList.add("dirty");
    }
    btn.disabled=false;
  });
  const itaTa=document.getElementById("interest-ta");
  if(itaTa) itaTa.oninput=()=>{
    const b=document.getElementById("save-interest");
    const m=document.getElementById("save-interest-msg");
    if(b){ b.textContent="저장"; b.classList.remove("saved","dirty"); }
    if(m) m.textContent="수정 중...";
  };

  // 학생 추가
  q("add-stu", btn=> btn.onclick=async()=>{
    const name=val("ns-name").trim();
    if(!name) return;
    const id=uid();
    DATA.students[id]={ name, dept:val("ns-dept"), cls:val("ns-cls"), year:val("ns-year"), track:val("ns-track"), owner:session.uid };
    DATA.submissions[id]={ versions:[], rounds:[] };
    try{
      await Promise.all([saveStudent(id), saveSubmission(id)]);
      console.log("[JRS] 학생 추가 성공:", id);
    } catch(e){
      alert("저장 실패: " + (e.message||e.code) + "\n\nFirestore 규칙을 확인해주세요.");
      return;
    }
    view.tab="status"; render();
  });

  // 학생 수정
  q("edit-stu-btn", e=> e.onclick=()=>{ view.editingStudent=true; render(); });
  q("cancel-edit",  e=> e.onclick=()=>{ view.editingStudent=false; render(); });
  q("save-edit", btn=> btn.onclick=async()=>{
    const s=DATA.students[view.studentId];
    s.name=val("e-name").trim()||s.name;
    s.dept=val("e-dept"); s.cls=val("e-cls"); s.year=val("e-year"); s.track=val("e-track");
    await saveStudent(view.studentId);
    view.editingStudent=false; render();
  });

  // 학생 삭제
  q("del-stu-btn", e=> e.onclick=async()=>{
    if(!confirm("이 학생의 모든 리뷰 기록이 삭제됩니다. 계속할까요?")) return;
    const id=view.studentId;
    delete DATA.students[id]; delete DATA.submissions[id];
    await deleteStudent(id); view.studentId=null; render();
  });

  // 사용자 삭제
  document.querySelectorAll("[data-deluser]").forEach(b=> b.onclick=async()=>{
    const uid=b.dataset.deluser;
    const u=DATA.users[uid];
    if(!confirm(`${u?.displayName||uid} 계정을 삭제할까요?`)) return;
    delete DATA.users[uid]; await deleteUserDoc(uid); render();
  });

  // 지원동기 제출/재제출
  q("submit-ver", btn=> btn.onclick=async()=>{
    const txt=val("new-text").trim();
    if(!txt){ alert("내용을 입력해주세요."); return; }
    btn.disabled=true;
    const id=view.studentId;
    const sub=subOf(id);
    sub.versions.push({ text:txt, ts:Date.now() });
    const newVIdx=sub.versions.length-1;
    const prev=lastRound(sub);
    if(prev && prev.adminDecision && prev.adminDecision.verdict!=="O"){
      sub.rounds.push({
        versionIndex:newVIdx,
        reviewers:prev.reviewers.map(rv=>({ slot:rv.slot, user:rv.user, deadline:todayPlus(3), feedback:null })),
        adminDecision:null
      });
    }
    try{
      await saveSubmission(id);
    } catch(e){
      alert("저장 실패: " + (e.message||e.code));
      render(); return;
    }
    render();
  });

  // 리뷰어 배정
  q("assign-btn", btn=> btn.onclick=async()=>{
    const r1=val("a-r1"), r2=val("a-r2"), dl=val("a-dl");
    if(r1===r2){ alert("리뷰어 1과 2는 다른 사람이어야 합니다."); return; }
    btn.disabled=true;
    const sub=subOf(view.studentId);
    sub.rounds.push({
      versionIndex:sub.versions.length-1,
      reviewers:[{slot:1,user:r1,deadline:dl,feedback:null},{slot:2,user:r2,deadline:dl,feedback:null}],
      adminDecision:null
    });
    await saveSubmission(view.studentId); render();
  });

  // 판정 버튼 (의견 보존)
  document.querySelectorAll(".vbtn[data-v]").forEach(b=> b.onclick=()=>{
    const ta=document.getElementById("rev-cmt");
    if(ta) view.reviewComment=ta.value;
    view.verdictPick=b.dataset.v; render();
  });
  document.querySelectorAll(".vbtn[data-av]").forEach(b=> b.onclick=()=>{
    const ta=document.getElementById("admin-cmt");
    if(ta) view.adminComment=ta.value;
    const dl=document.getElementById("resub-dl");
    if(dl) view.resubmitDeadline=dl.value;
    view.adminVerdict=b.dataset.av; render();
  });

  const revTa=document.getElementById("rev-cmt");
  if(revTa) revTa.oninput=e=>{ view.reviewComment=e.target.value; };
  const admTa=document.getElementById("admin-cmt");
  if(admTa) admTa.oninput=e=>{ view.adminComment=e.target.value; };

  // 리뷰 제출
  q("submit-rev", btn=> btn.onclick=async()=>{
    const cmt=(document.getElementById("rev-cmt")?.value||view.reviewComment).trim();
    if(!view.verdictPick||!cmt){ alert("판정과 의견을 모두 입력해주세요."); return; }
    btn.disabled=true;
    const sub=subOf(view.studentId);
    const r=lastRound(sub);
    const slot=r.reviewers.find(rv=>rv.user===session.uid);
    slot.feedback={ verdict:view.verdictPick, comment:cmt, ts:Date.now() };
    await saveSubmission(view.studentId);
    view.verdictPick=null; view.reviewComment=""; render();
  });

  // 최종 결정
  q("admin-decide-btn", btn=> btn.onclick=async()=>{
    const cmt=(document.getElementById("admin-cmt")?.value||view.adminComment).trim();
    const dl=document.getElementById("resub-dl")?.value||view.resubmitDeadline;
    if(!view.adminVerdict||!cmt){ alert("판정과 의견을 모두 입력해주세요."); return; }
    btn.disabled=true;
    const sub=subOf(view.studentId);
    const r=lastRound(sub);
    r.adminDecision={ verdict:view.adminVerdict, comment:cmt, resubmitDeadline:dl, by:session.uid, ts:Date.now() };
    await saveSubmission(view.studentId);
    view.adminVerdict=null; view.adminComment=""; render();
  });
}

// ─── 헬퍼 ──────────────────────────────────────────────
function q(id, fn){ const el=document.getElementById(id); if(el) fn(el); }
function val(id){ const el=document.getElementById(id); return el?el.value:""; }

function firebaseErrMsg(code){
  const map={
    "auth/user-not-found":"등록되지 않은 이메일입니다.",
    "auth/wrong-password":"비밀번호가 올바르지 않습니다.",
    "auth/email-already-in-use":"이미 사용 중인 이메일입니다.",
    "auth/weak-password":"비밀번호는 6자 이상이어야 합니다.",
    "auth/invalid-email":"이메일 형식이 올바르지 않습니다.",
    "auth/too-many-requests":"너무 많은 시도가 있었습니다. 잠시 후 다시 시도해주세요.",
    "auth/invalid-credential":"이메일 또는 비밀번호가 올바르지 않습니다.",
    "permission-denied":"Firestore 저장 권한이 없습니다. 관리자에게 문의하세요.",
    "unavailable":"네트워크 연결을 확인해주세요.",
  };
  return map[code] || `오류가 발생했습니다. (${code})`;
}

// ─── Firebase Auth 상태 감지 ────────────────────────────
auth.onAuthStateChanged(async(user)=>{
  loading=true; render();
  if(user){
    try {
      // 신규 가입인 경우: pendingReg를 Firestore에 먼저 저장
      if(pendingReg){
        console.log("[JRS] 신규 가입 감지 → Firestore에 프로필 저장 중...");
        try {
          await db.collection("users").doc(user.uid).set(pendingReg);
          DATA.users[user.uid] = { ...pendingReg };
          console.log("[JRS] 프로필 저장 완료:", user.uid);
        } catch(saveErr){
          console.error("[JRS] 프로필 저장 실패:", saveErr.code, saveErr.message);
        }
        pendingReg = null;
      }

      console.log("[JRS] 전체 데이터 로드 중...");
      await loadAllData();
      console.log("[JRS] 로드 완료 — users:", Object.keys(DATA.users).length,
        "students:", Object.keys(DATA.students).length);

      session={ uid:user.uid, email:user.email };
      view.tab = DATA.users[user.uid]?.role==="admin" ? "admin" : "status";
      view.studentId=null;
    } catch(e) {
      console.error("[JRS] 로드 실패:", e.code, e.message);
      if(e.message==="PERMISSION_DENIED"){
        loading=false;
        document.getElementById("root").innerHTML=`
          <div style="max-width:500px;margin:60px auto;padding:30px;background:#fff;border-radius:12px;text-align:center;font-family:sans-serif">
            <div style="font-size:32px;margin-bottom:12px">⚠️</div>
            <h3 style="color:#C0392B;margin-bottom:8px">Firestore 보안 규칙 오류</h3>
            <p style="color:#666;font-size:13px;line-height:1.6">Firebase Console → Firestore Database → <b>규칙</b> 탭에서<br>아래 규칙으로 교체 후 게시해주세요.</p>
            <pre style="background:#f4f4f4;padding:12px;border-radius:8px;font-size:11px;text-align:left;margin-top:12px;overflow:auto">rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if request.auth != null;
    }
  }
}</pre>
          </div>`;
        return;
      }
      session=null; loading=false; render(); return;
    }
  } else {
    session=null; DATA={ users:{}, students:{}, submissions:{} };
    view=makeDefaultView();
  }
  loading=false; render();
});
</script>
