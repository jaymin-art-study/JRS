<style>
  :root{
    --navy:#1F3864; --blue:#2E5090; --lblue:#1F6FB2; --bg:#F4F6F9;
    --card:#FFFFFF; --border:#E1E5EB; --text:#2B2F36; --muted:#7A828E;
    --green:#1D9E75; --amber:#BA7517; --red:#C0392B;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  .wrap{font-family:'Noto Sans KR',Arial,sans-serif;max-width:820px;margin:0 auto;color:var(--text);}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--navy);border-radius:12px 12px 0 0;flex-wrap:wrap;gap:8px;}
  .topbar .logo{color:#fff;font-weight:700;font-size:15px;letter-spacing:0.3px;}
  .topbar .user{color:#cfe0f7;font-size:12.5px;}
  .topbar .role{background:#3a5a94;color:#fff;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;}
  .topbar button{background:transparent;border:1px solid #5c79a8;color:#dce8fb;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;}
  .topbar button:hover{background:#2c4877;}
  .panel{background:var(--bg);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;padding:18px;min-height:420px;}
  .tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
  .tab{padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted);}
  .tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
  .row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .name{font-weight:700;font-size:14.5px;}
  .meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .b-wait{background:#FCE9E0;color:var(--red);}
  .b-mid{background:#FCF1D8;color:var(--amber);}
  .b-done{background:#E1F5EE;color:var(--green);}
  .b-rev{background:#E6EEFB;color:var(--lblue);}
  .btn{background:var(--navy);color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;}
  .btn:hover{background:var(--blue);}
  .btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--navy);}
  .btn.danger{background:#fff;color:var(--red);border:1px solid var(--red);}
  .btn.sm{padding:5px 10px;font-size:12px;}
  input,select,textarea{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px 10px;font-size:13.5px;font-family:inherit;background:#fff;color:var(--text);}
  textarea{min-height:110px;resize:vertical;line-height:1.5;}
  label{font-size:12px;color:var(--muted);font-weight:700;display:block;margin:10px 0 4px;}
  .login-box{max-width:360px;margin:40px auto;text-align:center;}
  .login-box h2{color:var(--navy);margin-bottom:4px;font-size:18px;}
  .login-box p{color:var(--muted);font-size:13px;margin-bottom:18px;}
  .switch{font-size:12.5px;color:var(--lblue);cursor:pointer;margin-top:12px;text-decoration:underline;}
  .err{color:var(--red);font-size:12.5px;margin-top:8px;}
  .ok{color:var(--green);font-size:12.5px;margin-top:8px;}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 0;}
  .back{font-size:12.5px;color:var(--lblue);cursor:pointer;margin-bottom:12px;display:inline-block;}
  .verdict-pick{display:flex;gap:8px;margin:8px 0;}
  .vbtn{flex:1;text-align:center;padding:10px;border-radius:8px;border:2px solid var(--border);cursor:pointer;font-weight:700;font-size:13.5px;color:var(--muted);background:#fff;}
  .vbtn.sel-O{border-color:var(--green);color:var(--green);background:#E1F5EE;}
  .vbtn.sel-T{border-color:var(--amber);color:var(--amber);background:#FCF1D8;}
  .vbtn.sel-X{border-color:var(--red);color:var(--red);background:#FCE9E0;}
  .draft{white-space:pre-wrap;font-size:13.5px;line-height:1.6;background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:8px;}
  .sectiontitle{font-size:13px;font-weight:700;color:var(--navy);margin:16px 0 6px;}
  .role-pick{display:flex;gap:8px;margin:4px 0;}
  .rbtn{flex:1;text-align:center;padding:8px;border-radius:7px;border:1px solid var(--border);cursor:pointer;font-size:12.5px;font-weight:700;color:var(--muted);background:#fff;}
  .rbtn.sel{border-color:var(--navy);color:var(--navy);background:#EAF0FA;}
  .decision-box{border-radius:8px;padding:12px;margin-top:8px;}
  .decision-box.O{background:#E1F5EE;border:1px solid #b8e6d4;}
  .decision-box.T{background:#FCF1D8;border:1px solid #f3dca0;}
  .decision-box.X{background:#FCE9E0;border:1px solid #f1c2b0;}
  .decision-box .v{font-weight:700;font-size:13px;margin-bottom:4px;}
  .loading{text-align:center;padding:60px 0;color:var(--muted);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .roundhead{font-size:12.5px;font-weight:700;color:#fff;background:var(--blue);display:inline-block;padding:3px 10px;border-radius:6px;margin:14px 0 8px;}
  table.simple{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.simple th{text-align:left;color:var(--muted);font-weight:700;padding:6px 4px;border-bottom:1px solid var(--border);}
  table.simple td{padding:7px 4px;border-bottom:1px solid #eee;}
  .pill{font-size:10.5px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1px 7px;color:var(--muted);}
  .hint{font-size:11.5px;color:var(--muted);margin-top:4px;}
</style>

<div class="wrap" id="app">
  <div class="loading">불러오는 중...</div>
</div>

<script>
const STORAGE_KEY = "jaymin-app-data-v4";
const DEPTS = ["예술경영", "방송영상", "공연연출", "공통"];
const ADMIN_CODE = "JAYMIN0000";
const CLASSES = ["월1반","월2반","화1반","화2반","수1반","수2반","목1반","목2반",
  "금1반","금2반","금3반","금4반",
  "토1반","토2반","토3반","토4반","토5반","토6반","토7반","토8반",
  "일1반","일2반","일3반","일4반","속성반"];
const TRACKS = ["수시","정시"];
const CUR_YEAR = new Date().getFullYear();
const YEARS = [CUR_YEAR-1, CUR_YEAR, CUR_YEAR+1, CUR_YEAR+2];
const VMAP = {O:"O 통과/승인", T:"△ 수정 필요", X:"X 재작성 필요"};

let DATA = { users:{}, students:{}, submissions:{} };
let session = null;
let view = { tab:"mine", studentId:null, mode:"login", authErr:"", regRole:"teacher", regDept:DEPTS[0],
  verdictPick:null, reviewComment:"", adminVerdict:null, adminComment:"", resubmitDeadline:"",
  editingStudent:false, recoverStep:1, recoverId:"", recoverQ:"", recoverErr:"", recoverOk:"" };

function uid(prefix){ return prefix + "_" + Math.random().toString(36).slice(2,9); }
function escapeHtml(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function todayPlus(days){ const d=new Date(); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }

async function loadData(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){ DATA = JSON.parse(res.value); }
  }catch(e){}
  if(!DATA.users) DATA.users = {};
  if(!DATA.students) DATA.students = {};
  if(!DATA.submissions) DATA.submissions = {};
  render();
}
async function saveData(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(DATA), true); }catch(e){ console.error(e); }
}

function isAdmin(username){ const u = DATA.users[username]; return u && u.role === "admin"; }
function userLabel(username){
  const u = DATA.users[username];
  if(!u) return "(탈퇴한 계정)";
  return u.displayName + (u.role==="admin" ? " (관리자)" : "");
}
function userLabelWithDept(username){
  const u = DATA.users[username];
  if(!u) return "(탈퇴한 계정)";
  return `${u.dept||"-"} · ${u.displayName}` + (u.role==="admin" ? " (관리자)" : "");
}
function subOf(id){
  if(!DATA.submissions[id]) DATA.submissions[id] = { versions:[], rounds:[] };
  if(!DATA.submissions[id].rounds) DATA.submissions[id].rounds = [];
  return DATA.submissions[id];
}
function lastRound(sub){ return sub.rounds.length ? sub.rounds[sub.rounds.length-1] : null; }

function statusOf(id){
  const sub = subOf(id);
  if(sub.versions.length===0) return {label:"미제출", cls:"b-wait"};
  const r = lastRound(sub);
  if(!r) return {label:"리뷰 배정 필요", cls:"b-wait"};
  const roundNo = sub.rounds.length;
  if(!r.adminDecision){
    const done = r.reviewers.filter(rv=>rv.feedback).length;
    if(done >= 2) return {label:`${roundNo}차 · 최종결정 대기`, cls:"b-mid"};
    const overdue = r.reviewers.some(rv=>!rv.feedback && new Date(rv.deadline) < new Date(new Date().toDateString()));
    return {label:`${roundNo}차 리뷰중 (${done}/2)${overdue?" · 기한초과":""}`, cls: overdue?"b-wait":"b-rev"};
  }
  if(r.adminDecision.verdict==="O") return {label:"완료 (승인)", cls:"b-done"};
  return {label:`${roundNo}차 수정요청 (재제출기한 ${r.adminDecision.resubmitDeadline||"-"})`, cls:"b-wait"};
}

function render(){
  const el = document.getElementById("app");
  if(!session){ el.innerHTML = renderLogin(); attachLoginEvents(); return; }
  el.innerHTML = renderApp();
  attachAppEvents();
}

// ---------- LOGIN / REGISTER / RECOVER ----------
function renderLogin(){
  if(view.mode === "register"){
    return `
      <div class="login-box">
        <h2>JAYMIN 지원동기 리뷰 시스템</h2>
        <p>새 계정 만들기</p>
        <label>학과</label>
        <select id="reg-dept">${DEPTS.map(d=>`<option value="${d}" ${view.regDept===d?'selected':''}>${d}</option>`).join("")}</select>
        <label>이름 (이름 뒤에 T를 붙여 입력해주세요)</label>
        <input id="reg-name" placeholder="길동T" />
        <div class="hint">예: 본인 이름이 '홍길동'이라면 → 길동T</div>
        <label>아이디</label><input id="reg-id" placeholder="로그인에 사용할 아이디" />
        <label>비밀번호</label><input id="reg-pw" type="password" />
        <label>역할</label>
        <div class="role-pick">
          <div class="rbtn ${view.regRole==='teacher'?'sel':''}" data-role="teacher">담당 선생님</div>
          <div class="rbtn ${view.regRole==='admin'?'sel':''}" data-role="admin">원장/부원장</div>
        </div>
        ${view.regRole==='admin' ? `<label>관리자 코드</label><input id="reg-code" placeholder="관리자 코드 입력" />` : ""}
        <label>비밀번호 찾기용 답 (내가 가장 좋아하는 예술가의 이름은?)</label>
        <input id="reg-seca" placeholder="예술가 이름을 입력하세요" />
        <div style="margin-top:16px;"><button class="btn" id="reg-submit" style="width:100%;">가입하고 시작</button></div>
        ${view.authErr ? `<div class="err">${escapeHtml(view.authErr)}</div>` : ""}
        <div class="switch" id="to-login">이미 계정이 있어요 → 로그인</div>
      </div>`;
  }
  if(view.mode === "recover"){
    if(view.recoverStep === 1){
      return `
        <div class="login-box">
          <h2>비밀번호 찾기</h2>
          <p>가입 시 등록한 아이디를 입력해주세요</p>
          <label>아이디</label><input id="rec-id" />
          <div style="margin-top:16px;"><button class="btn" id="rec-step1" style="width:100%;">다음</button></div>
          ${view.recoverErr ? `<div class="err">${escapeHtml(view.recoverErr)}</div>` : ""}
          <div class="switch" id="to-login2">로그인으로 돌아가기</div>
        </div>`;
    }
    return `
      <div class="login-box">
        <h2>비밀번호 찾기</h2>
        <p>${escapeHtml(view.recoverQ)}</p>
        <label>답</label><input id="rec-answer" />
        <label>새 비밀번호</label><input id="rec-newpw" type="password" />
        <div style="margin-top:16px;"><button class="btn" id="rec-step2" style="width:100%;">비밀번호 변경</button></div>
        ${view.recoverErr ? `<div class="err">${escapeHtml(view.recoverErr)}</div>` : ""}
        ${view.recoverOk ? `<div class="ok">${escapeHtml(view.recoverOk)}</div>` : ""}
        <div class="switch" id="to-login2">로그인으로 돌아가기</div>
      </div>`;
  }
  return `
    <div class="login-box">
      <h2>JAYMIN 지원동기 리뷰 시스템</h2>
      <p>아이디와 비밀번호로 로그인하세요</p>
      <label>아이디</label><input id="login-id" />
      <label>비밀번호</label><input id="login-pw" type="password" />
      <div style="margin-top:16px;"><button class="btn" id="login-submit" style="width:100%;">로그인</button></div>
      ${view.authErr ? `<div class="err">${escapeHtml(view.authErr)}</div>` : ""}
      <div class="switch" id="to-register">계정이 없어요 → 가입하기</div>
      <div class="switch" id="to-recover">아이디/비밀번호를 잊으셨나요?</div>
      <div class="hint">아이디 자체를 잊으셨다면 관리자(원장/부원장)에게 문의해주세요.</div>
    </div>`;
}

function attachLoginEvents(){
  const toReg = document.getElementById("to-register");
  if(toReg) toReg.onclick = () => { view.mode="register"; view.authErr=""; render(); };
  const toLogin = document.getElementById("to-login");
  if(toLogin) toLogin.onclick = () => { view.mode="login"; view.authErr=""; render(); };
  const toLogin2 = document.getElementById("to-login2");
  if(toLogin2) toLogin2.onclick = () => { view.mode="login"; view.authErr=""; view.recoverStep=1; render(); };
  const toRecover = document.getElementById("to-recover");
  if(toRecover) toRecover.onclick = () => { view.mode="recover"; view.recoverStep=1; view.recoverErr=""; view.recoverOk=""; render(); };

  const deptSel = document.getElementById("reg-dept");
  if(deptSel) deptSel.onchange = (e) => { view.regDept = e.target.value; };

  document.querySelectorAll(".rbtn").forEach(b=>{
    b.onclick = () => { view.regRole = b.getAttribute("data-role"); render(); };
  });

  const loginBtn = document.getElementById("login-submit");
  if(loginBtn) loginBtn.onclick = () => {
    const id = document.getElementById("login-id").value.trim();
    const pw = document.getElementById("login-pw").value;
    const u = DATA.users[id];
    if(!u || u.password !== pw){ view.authErr = "아이디 또는 비밀번호가 올바르지 않습니다."; render(); return; }
    session = id; view.authErr=""; view.tab = isAdmin(id) ? "admin" : "mine"; render();
  };

  const regBtn = document.getElementById("reg-submit");
  if(regBtn) regBtn.onclick = async () => {
    const dept = document.getElementById("reg-dept").value;
    const name = document.getElementById("reg-name").value.trim();
    const id = document.getElementById("reg-id").value.trim();
    const pw = document.getElementById("reg-pw").value;
    const seca = document.getElementById("reg-seca").value.trim();
    if(!name || !id || !pw || !seca){ view.authErr = "모든 칸을 입력해주세요."; render(); return; }
    if(DATA.users[id]){ view.authErr = "이미 존재하는 아이디입니다."; render(); return; }
    let role = "teacher";
    if(view.regRole === "admin"){
      const code = document.getElementById("reg-code").value.trim();
      if(code !== ADMIN_CODE){ view.authErr = "관리자 코드가 올바르지 않습니다."; render(); return; }
      role = "admin";
    }
    DATA.users[id] = { password: pw, displayName: name, role, dept, interest:"", secQ: "내가 가장 좋아하는 예술가의 이름은?", secA: seca };
    await saveData();
    session = id; view.mode="login"; view.authErr="";
    view.tab = role==="admin" ? "admin" : "mine"; render();
  };

  const rec1 = document.getElementById("rec-step1");
  if(rec1) rec1.onclick = () => {
    const id = document.getElementById("rec-id").value.trim();
    const u = DATA.users[id];
    if(!u){ view.recoverErr = "존재하지 않는 아이디입니다."; render(); return; }
    view.recoverId = id; view.recoverQ = "내가 가장 좋아하는 예술가의 이름은?";
    view.recoverErr=""; view.recoverStep = 2; render();
  };
  const rec2 = document.getElementById("rec-step2");
  if(rec2) rec2.onclick = async () => {
    const answer = document.getElementById("rec-answer").value.trim();
    const newpw = document.getElementById("rec-newpw").value;
    const u = DATA.users[view.recoverId];
    if(!u || answer !== u.secA){ view.recoverErr = "답이 일치하지 않습니다."; view.recoverOk=""; render(); return; }
    if(!newpw){ view.recoverErr = "새 비밀번호를 입력해주세요."; render(); return; }
    u.password = newpw;
    await saveData();
    view.recoverErr=""; view.recoverOk="비밀번호가 변경되었습니다. 로그인해주세요.";
    render();
  };
}

// ---------- APP ----------
function renderApp(){
  const me = DATA.users[session];
  const admin = isAdmin(session);
  const myAssignments = Object.entries(DATA.students).filter(([id,s])=>{
    const sub = subOf(id);
    const r = lastRound(sub);
    if(!r || r.adminDecision) return false;
    return r.reviewers.some(rv => rv.user === session && !rv.feedback);
  });

  let body = "";
  if(view.studentId){
    body = renderDetail(view.studentId);
  } else if(view.tab === "admin" && admin){
    body = renderAdminDashboard();
  } else if(view.tab === "load" && admin){
    body = renderReviewerLoad();
  } else if(view.tab === "users" && admin){
    body = renderUserManagement();
  } else if(view.tab === "review"){
    body = renderMyReviewQueue(myAssignments);
  } else {
    body = renderMyStudents();
  }

  const tabs = [];
  if(admin) tabs.push({k:"admin", l:"전체 현황"});
  tabs.push({k:"mine", l:"내 학생"});
  if(myAssignments.length>0 || view.tab==="review") tabs.push({k:"review", l:`리뷰 요청 (${myAssignments.length})`});
  if(admin) tabs.push({k:"load", l:"리뷰어 현황"});
  if(admin) tabs.push({k:"users", l:"사용자 관리"});

  return `
    <div class="topbar">
      <div class="logo">JAYMIN 지원동기 리뷰 시스템</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="user">${escapeHtml(me.displayName)}님 ${admin?'<span class="role">관리자</span>':''}</div>
        <button id="logout">로그아웃</button>
      </div>
    </div>
    <div class="panel">
      ${!view.studentId ? `
      <div class="tabs">
        ${tabs.map(t=>`<div class="tab ${view.tab===t.k?'active':''}" data-tab="${t.k}">${t.l}</div>`).join("")}
      </div>` : ""}
      ${body}
    </div>`;
}

// ---------- MY STUDENTS ----------
function renderMyStudents(){
  const me = DATA.users[session];
  const mine = Object.entries(DATA.students).filter(([id,s]) => s.owner === session);
  let list = mine.map(([id,s]) => {
    const st = statusOf(id);
    return `
      <div class="card" data-open="${id}" style="cursor:pointer;">
        <div class="row">
          <div><div class="name">${escapeHtml(s.name)}</div>
          <div class="meta">${escapeHtml(s.dept)} · ${escapeHtml(s.cls)} · ${s.year}년 ${s.track}</div></div>
          <div class="badge ${st.cls}">${st.label}</div>
        </div>
      </div>`;
  }).join("");
  if(mine.length===0) list = `<div class="empty">아직 등록된 학생이 없습니다. 아래 버튼으로 추가해보세요.</div>`;
  return `
    <div class="card">
      <div class="sectiontitle" style="margin-top:0;">내 관심분야 / 잘 보는 장르</div>
      <div class="meta" style="margin-bottom:6px;">관리자가 리뷰어를 배정할 때 참고합니다.</div>
      <textarea id="profile-interest" placeholder="예: 뮤지컬 연출, 다큐멘터리 기획, 무대조명...">${escapeHtml(me.interest||"")}</textarea>
      <div style="margin-top:8px;"><button class="btn sm" id="save-profile">저장</button></div>
    </div>
    ${list}
    <div class="card" style="margin-top:14px;">
      <div class="sectiontitle" style="margin-top:0;">새 학생 추가</div>
      <label>이름</label><input id="new-stu-name" placeholder="학생 이름" />
      <div class="grid2">
        <div><label>학과</label>
          <select id="new-stu-dept">${DEPTS.filter(d=>d!=='공통').map(d=>`<option value="${d}">${d}</option>`).join("")}</select>
        </div>
        <div><label>반</label>
          <select id="new-stu-cls">${CLASSES.map(c=>`<option value="${c}">${c}</option>`).join("")}</select>
        </div>
      </div>
      <div class="grid2">
        <div><label>연도</label>
          <select id="new-stu-year">${YEARS.map(y=>`<option value="${y}" ${y===CUR_YEAR?'selected':''}>${y}년</option>`).join("")}</select>
        </div>
        <div><label>전형</label>
          <select id="new-stu-track">${TRACKS.map(t=>`<option value="${t}">${t}</option>`).join("")}</select>
        </div>
      </div>
      <div style="margin-top:10px;"><button class="btn" id="add-student">학생 추가</button></div>
    </div>`;
}

// ---------- ADMIN DASHBOARD ----------
function renderAdminDashboard(){
  const all = Object.entries(DATA.students);
  if(all.length===0) return `<div class="empty">아직 제출된 학생이 없습니다.</div>`;
  return all.map(([id,s])=>{
    const st = statusOf(id);
    return `
      <div class="card" data-open="${id}" style="cursor:pointer;">
        <div class="row">
          <div>
            <div class="name">${escapeHtml(s.name)} <span class="pill">${s.year}년 ${s.track}</span></div>
            <div class="meta">${escapeHtml(s.dept)} · ${escapeHtml(s.cls)} · 담당: ${escapeHtml(userLabelWithDept(s.owner))}</div>
          </div>
          <div class="badge ${st.cls}">${st.label}</div>
        </div>
      </div>`;
  }).join("");
}

// ---------- REVIEWER LOAD ----------
function renderReviewerLoad(){
  const stats = {};
  Object.values(DATA.submissions).forEach(sub=>{
    (sub.rounds||[]).forEach(r=>{
      r.reviewers.forEach(rv=>{
        if(!stats[rv.user]) stats[rv.user] = {assigned:0, done:0};
        stats[rv.user].assigned++;
        if(rv.feedback) stats[rv.user].done++;
      });
    });
  });
  const rows = Object.entries(stats).sort((a,b)=>b[1].assigned-a[1].assigned);
  if(rows.length===0) return `<div class="empty">아직 배정 기록이 없습니다.</div>`;
  return `<div class="card"><table class="simple">
    <tr><th>선생님</th><th>배정됨</th><th>완료</th><th>대기중</th></tr>
    ${rows.map(([u,st])=>`<tr><td>${escapeHtml(userLabelWithDept(u))}</td><td>${st.assigned}</td><td>${st.done}</td><td>${st.assigned-st.done}</td></tr>`).join("")}
  </table></div>`;
}

// ---------- USER MANAGEMENT ----------
function renderUserManagement(){
  const rows = Object.entries(DATA.users);
  return rows.map(([u,info])=>{
    const isMe = u===session;
    return `
      <div class="card">
        <div class="row">
          <div>
            <div class="name">${escapeHtml(info.dept||"-")} · ${escapeHtml(info.displayName)} ${info.role==='admin'?'<span class="pill">관리자</span>':''}</div>
            <div class="meta">아이디: ${u} ${info.interest?(' · 관심: '+escapeHtml(info.interest)):''}</div>
          </div>
          ${isMe ? `<span class="meta">나</span>` : `<button class="btn danger sm" data-deluser="${u}">삭제</button>`}
        </div>
      </div>`;
  }).join("");
}

// ---------- MY REVIEW QUEUE ----------
function renderMyReviewQueue(myAssignments){
  if(myAssignments.length===0) return `<div class="empty">현재 배정된 리뷰가 없습니다.</div>`;
  return myAssignments.map(([id,s])=>{
    const sub = subOf(id);
    const r = lastRound(sub);
    const mySlot = r.reviewers.find(rv=>rv.user===session);
    return `
      <div class="card" data-open="${id}" style="cursor:pointer;">
        <div class="row">
          <div>
            <div class="name">${escapeHtml(s.dept)} · ${escapeHtml(s.name)} (${sub.rounds.length}차)</div>
            <div class="meta">마감일: ${mySlot.deadline}</div>
          </div>
          <div class="badge b-rev">리뷰하기</div>
        </div>
      </div>`;
  }).join("");
}

// ---------- DETAIL ----------
function renderDetail(studentId){
  const s = DATA.students[studentId];
  const admin = isAdmin(session);
  const isOwner = s.owner === session;
  const sub = subOf(studentId);
  const vIdx = sub.versions.length - 1;
  const latest = vIdx>=0 ? sub.versions[vIdx] : null;
  const r = lastRound(sub);
  const isMyReviewTask = r && !r.adminDecision && r.reviewers.some(rv=>rv.user===session && !rv.feedback);

  let html = `<div class="back" id="back-btn">← 목록으로</div>`;

  if(view.editingStudent){
    html += `<div class="card">
      <div class="sectiontitle" style="margin-top:0;">학생 정보 수정</div>
      <label>이름</label><input id="edit-name" value="${escapeHtml(s.name)}" />
      <div class="grid2">
        <div><label>학과</label><select id="edit-dept">${DEPTS.filter(d=>d!=='공통').map(d=>`<option value="${d}" ${s.dept===d?'selected':''}>${d}</option>`).join("")}</select></div>
        <div><label>반</label><select id="edit-cls">${CLASSES.map(c=>`<option value="${c}" ${s.cls===c?'selected':''}>${c}</option>`).join("")}</select></div>
      </div>
      <div class="grid2">
        <div><label>연도</label><select id="edit-year">${YEARS.map(y=>`<option value="${y}" ${String(s.year)===String(y)?'selected':''}>${y}년</option>`).join("")}</select></div>
        <div><label>전형</label><select id="edit-track">${TRACKS.map(t=>`<option value="${t}" ${s.track===t?'selected':''}>${t}</option>`).join("")}</select></div>
      </div>
      <div style="margin-top:10px;display:flex;gap:8px;">
        <button class="btn" id="save-edit">저장</button>
        <button class="btn ghost" id="cancel-edit">취소</button>
      </div>
    </div>`;
  } else {
    html += `<div class="card">
      <div class="row">
        <div><div class="name">${escapeHtml(s.name)} <span class="pill">${s.year}년 ${s.track}</span></div>
        <div class="meta">${escapeHtml(s.dept)} · ${escapeHtml(s.cls)} ${latest?`· 현재 ${sub.rounds.length}차 / v${vIdx+1}`:"· 제출 전"}</div></div>
        ${(isOwner || admin) ? `<div style="display:flex;gap:6px;">
          <button class="btn ghost sm" id="edit-btn">수정</button>
          <button class="btn danger sm" id="del-stu-btn">삭제</button>
        </div>` : ""}
      </div>
      ${latest ? `<div class="draft">${escapeHtml(latest.text)}</div>` : `<div class="empty">아직 제출된 지원동기가 없습니다.</div>`}
    </div>`;
  }

  if(sub.rounds.length>0 && (isOwner || admin)){
    sub.rounds.forEach((rd, i) => {
      html += `<div class="roundhead">${i+1}차 리뷰</div>`;
      html += `<div class="card">`;
      rd.reviewers.forEach(rv => {
        html += `<div style="margin-bottom:8px;">
          <div class="meta" style="font-weight:700;color:var(--navy);">리뷰어 ${rv.slot} ${admin?('· '+escapeHtml(userLabelWithDept(rv.user))):''}</div>
          ${rv.feedback
            ? `<div class="decision-box ${rv.feedback.verdict}"><div class="v">${VMAP[rv.feedback.verdict]}</div><div>${escapeHtml(rv.feedback.comment)}</div></div>`
            : `<div class="meta">마감 ${rv.deadline} · 아직 리뷰 전</div>`}
        </div>`;
      });
      if(rd.adminDecision){
        html += `<div style="margin-top:6px;">
          <div class="meta" style="font-weight:700;color:var(--navy);">원장/부원장 최종 결정</div>
          <div class="decision-box ${rd.adminDecision.verdict}"><div class="v">${VMAP[rd.adminDecision.verdict]}</div><div>${escapeHtml(rd.adminDecision.comment)}</div>
          ${rd.adminDecision.verdict!=="O" && rd.adminDecision.resubmitDeadline ? `<div class="meta" style="margin-top:6px;">재제출 기한: ${rd.adminDecision.resubmitDeadline}</div>`:""}
          </div>
        </div>`;
      }
      html += `</div>`;
    });
  }

  if(isOwner){
    const showResubmit = !r || !r.adminDecision || r.adminDecision.verdict !== "O";
    if(showResubmit){
      html += `<div class="card">
        <div class="sectiontitle" style="margin-top:0;">${vIdx>=0?"수정본 제출":"지원동기 제출"}</div>
        <textarea id="new-text" placeholder="지원동기를 입력하세요..."></textarea>
        <div style="margin-top:10px;"><button class="btn" id="submit-version">${vIdx>=0?"수정본 제출":"제출하기"}</button></div>
      </div>`;
    }
  }

  if(admin){
    const needsAssignment = latest && (!r || r.versionIndex !== vIdx);
    if(needsAssignment){
      const teacherOptions = Object.entries(DATA.users)
        .filter(([uname,u]) => uname !== s.owner)
        .map(([uname,u]) => `<option value="${uname}">${escapeHtml(u.dept||'-')} · ${escapeHtml(u.displayName)}${u.role==='admin'?' (관리자)':''}${u.interest?(' - '+escapeHtml(u.interest.slice(0,18))):''}</option>`).join("");
      html += `<div class="card">
        <div class="sectiontitle" style="margin-top:0;">리뷰어 지정 (${sub.rounds.length+1}차)</div>
        <label>리뷰어 1</label><select id="assign-r1">${teacherOptions}</select>
        <label>리뷰어 2</label><select id="assign-r2">${teacherOptions}</select>
        <label>마감일</label><input id="assign-deadline" type="date" value="${todayPlus(3)}" />
        <div style="margin-top:10px;"><button class="btn" id="assign-btn">리뷰 배정하기</button></div>
      </div>`;
    } else if(r && !r.adminDecision){
      const done = r.reviewers.filter(rv=>rv.feedback).length;
      if(done < 2){
        html += `<div class="card"><div class="meta">현재 ${done}/2명 리뷰 완료. 모두 완료되면 최종 결정을 작성할 수 있습니다.</div></div>`;
      } else {
        html += `<div class="card">
          <div class="sectiontitle" style="margin-top:0;">최종 결정 작성 (선생님에게 전달됨)</div>
          <div class="verdict-pick">
            <div class="vbtn ${view.adminVerdict==='O'?'sel-O':''}" data-av="O">O 승인</div>
            <div class="vbtn ${view.adminVerdict==='T'?'sel-T':''}" data-av="T">△ 수정</div>
            <div class="vbtn ${view.adminVerdict==='X'?'sel-X':''}" data-av="X">X 재작성</div>
          </div>
          <textarea id="admin-comment" placeholder="선생님에게 전달할 종합 의견...">${escapeHtml(view.adminComment)}</textarea>
          <label>재제출 기한 (수정/재작성인 경우)</label>
          <input id="resubmit-deadline" type="date" value="${view.resubmitDeadline||todayPlus(5)}" />
          <div style="margin-top:10px;"><button class="btn" id="admin-decide-btn">최종 결정 전달</button></div>
        </div>`;
      }
    }
  }

  if(isMyReviewTask){
    const mySlot = r.reviewers.find(rv=>rv.user===session);
    html += `<div class="card">
      <div class="sectiontitle" style="margin-top:0;">리뷰 작성 (마감 ${mySlot.deadline})</div>
      <textarea id="review-comment" placeholder="구체적인 코멘트를 남겨주세요...">${escapeHtml(view.reviewComment)}</textarea>
      <div class="verdict-pick">
        <div class="vbtn ${view.verdictPick==='O'?'sel-O':''}" data-v="O">O 통과</div>
        <div class="vbtn ${view.verdictPick==='T'?'sel-T':''}" data-v="T">△ 수정</div>
        <div class="vbtn ${view.verdictPick==='X'?'sel-X':''}" data-v="X">X 재작성</div>
      </div>
      <div style="margin-top:10px;"><button class="btn" id="submit-review">리뷰 제출 (원장/부원장에게 전달)</button></div>
    </div>`;
  }

  return html;
}

// ---------- EVENTS ----------
function attachAppEvents(){
  const logout = document.getElementById("logout");
  if(logout) logout.onclick = () => { session=null; view={tab:"mine",studentId:null,mode:"login",authErr:"",regRole:"teacher",regDept:DEPTS[0],verdictPick:null,reviewComment:"",adminVerdict:null,adminComment:"",resubmitDeadline:"",editingStudent:false,recoverStep:1,recoverId:"",recoverQ:"",recoverErr:"",recoverOk:""}; render(); };

  document.querySelectorAll(".tab").forEach(t => { t.onclick = () => { view.tab = t.getAttribute("data-tab"); view.studentId=null; render(); }; });
  document.querySelectorAll("[data-open]").forEach(c => { c.onclick = () => {
    view.studentId = c.getAttribute("data-open"); view.verdictPick=null; view.reviewComment="";
    view.adminVerdict=null; view.adminComment=""; view.resubmitDeadline=""; view.editingStudent=false; render();
  }; });
  const back = document.getElementById("back-btn");
  if(back) back.onclick = () => { view.studentId=null; render(); };

  const saveProfile = document.getElementById("save-profile");
  if(saveProfile) saveProfile.onclick = async () => {
    const val = document.getElementById("profile-interest").value.trim();
    DATA.users[session].interest = val;
    await saveData(); render();
  };

  const addBtn = document.getElementById("add-student");
  if(addBtn) addBtn.onclick = async () => {
    const name = document.getElementById("new-stu-name").value.trim();
    if(!name) return;
    const dept = document.getElementById("new-stu-dept").value;
    const cls = document.getElementById("new-stu-cls").value;
    const year = document.getElementById("new-stu-year").value;
    const track = document.getElementById("new-stu-track").value;
    const id = uid("stu");
    DATA.students[id] = { name, dept, cls, year, track, owner: session };
    DATA.submissions[id] = { versions:[], rounds:[] };
    await saveData(); render();
  };

  const editBtn = document.getElementById("edit-btn");
  if(editBtn) editBtn.onclick = () => { view.editingStudent = true; render(); };
  const cancelEdit = document.getElementById("cancel-edit");
  if(cancelEdit) cancelEdit.onclick = () => { view.editingStudent = false; render(); };
  const saveEdit = document.getElementById("save-edit");
  if(saveEdit) saveEdit.onclick = async () => {
    const s = DATA.students[view.studentId];
    s.name = document.getElementById("edit-name").value.trim() || s.name;
    s.dept = document.getElementById("edit-dept").value;
    s.cls = document.getElementById("edit-cls").value;
    s.year = document.getElementById("edit-year").value;
    s.track = document.getElementById("edit-track").value;
    await saveData(); view.editingStudent=false; render();
  };
  const delStu = document.getElementById("del-stu-btn");
  if(delStu) delStu.onclick = async () => {
    if(!confirm("이 학생의 모든 제출/리뷰 기록이 삭제됩니다. 계속할까요?")) return;
    delete DATA.students[view.studentId];
    delete DATA.submissions[view.studentId];
    await saveData(); view.studentId=null; render();
  };

  document.querySelectorAll("[data-deluser]").forEach(b=>{
    b.onclick = async () => {
      const u = b.getAttribute("data-deluser");
      if(!confirm(`${userLabelWithDept(u)} 계정을 삭제할까요? (학생/리뷰 기록은 남습니다)`)) return;
      delete DATA.users[u];
      await saveData(); render();
    };
  });

  const submitVer = document.getElementById("submit-version");
  if(submitVer) submitVer.onclick = async () => {
    const txt = document.getElementById("new-text").value.trim();
    if(!txt) return;
    const sid = view.studentId;
    const sub = subOf(sid);
    sub.versions.push({text: txt, ts: Date.now()});
    const newVIdx = sub.versions.length - 1;
    const prevRound = lastRound(sub);
    if(prevRound && prevRound.adminDecision && prevRound.adminDecision.verdict !== "O"){
      const reviewers = prevRound.reviewers.map(rv => ({ slot: rv.slot, user: rv.user, deadline: todayPlus(3), feedback: null }));
      sub.rounds.push({ versionIndex: newVIdx, reviewers, adminDecision: null });
    }
    await saveData(); render();
  };

  const assignBtn = document.getElementById("assign-btn");
  if(assignBtn) assignBtn.onclick = async () => {
    const r1 = document.getElementById("assign-r1").value;
    const r2 = document.getElementById("assign-r2").value;
    const deadline = document.getElementById("assign-deadline").value;
    if(!r1 || !r2 || !deadline) return;
    if(r1 === r2){ alert("리뷰어 1과 리뷰어 2는 다른 사람이어야 합니다."); return; }
    const sub = subOf(view.studentId);
    const vIdx = sub.versions.length - 1;
    sub.rounds.push({
      versionIndex: vIdx,
      reviewers: [
        {slot:1, user:r1, deadline, feedback:null},
        {slot:2, user:r2, deadline, feedback:null}
      ],
      adminDecision: null
    });
    await saveData(); render();
  };

  document.querySelectorAll(".vbtn[data-v]").forEach(b => {
    b.onclick = () => {
      const ta = document.getElementById("review-comment");
      if(ta) view.reviewComment = ta.value;
      view.verdictPick = b.getAttribute("data-v"); render();
    };
  });
  document.querySelectorAll(".vbtn[data-av]").forEach(b => {
    b.onclick = () => {
      const ta = document.getElementById("admin-comment");
      if(ta) view.adminComment = ta.value;
      const dl = document.getElementById("resubmit-deadline");
      if(dl) view.resubmitDeadline = dl.value;
      view.adminVerdict = b.getAttribute("data-av"); render();
    };
  });

  const reviewTa = document.getElementById("review-comment");
  if(reviewTa) reviewTa.oninput = (e) => { view.reviewComment = e.target.value; };
  const adminTa = document.getElementById("admin-comment");
  if(adminTa) adminTa.oninput = (e) => { view.adminComment = e.target.value; };

  const submitRev = document.getElementById("submit-review");
  if(submitRev) submitRev.onclick = async () => {
    const ta = document.getElementById("review-comment");
    const comment = (ta ? ta.value : view.reviewComment).trim();
    if(!view.verdictPick || !comment){ alert("판정과 의견을 모두 입력해주세요."); return; }
    const sub = subOf(view.studentId);
    const r = lastRound(sub);
    const mySlot = r.reviewers.find(rv=>rv.user===session);
    mySlot.feedback = { verdict: view.verdictPick, comment, ts: Date.now() };
    await saveData(); view.verdictPick=null; view.reviewComment=""; render();
  };

  const decideBtn = document.getElementById("admin-decide-btn");
  if(decideBtn) decideBtn.onclick = async () => {
    const ta = document.getElementById("admin-comment");
    const comment = (ta ? ta.value : view.adminComment).trim();
    const resubmitDeadline = document.getElementById("resubmit-deadline").value;
    if(!view.adminVerdict || !comment){ alert("판정과 의견을 모두 입력해주세요."); return; }
    const sub = subOf(view.studentId);
    const r = lastRound(sub);
    r.adminDecision = { verdict: view.adminVerdict, comment, resubmitDeadline, by: session, ts: Date.now() };
    await saveData(); view.adminVerdict=null; view.adminComment=""; render();
  };
}

loadData();
</script>
